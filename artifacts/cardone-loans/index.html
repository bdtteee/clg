    <!-- JSON-LD: FAQPage (top questions) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Who can apply for Cardone Loans & Grants?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Any Kenyan individual aged 18 or above, or a registered Kenyan business, can apply. You need a valid National ID or passport and an active M-Pesa line for the processing fee."
          }
        },
        {
          "@type": "Question",
          "name": "How much funding can I get?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Personal Grants: $2,000–$10,000 USD. Business Grants: $5,000–$30,000 USD. Personal Loans: $10,000–$50,000 USD. Business Loans: $20,000–$100,000 USD. All disbursed in USD."
          }
        },
        {
          "@type": "Question",
          "name": "How long does approval take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Standard approval takes 2–3 business days after documentation and the processing fee are received. Funds are disbursed within 14 days of approval."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need collateral for a loan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No collateral is required for any of our products. Our U.S.-based funding partners assess applications based on submitted information, income, and business details — not physical Kenyan assets."
          }
        },
        {
          "@type": "Question",
          "name": "How do I pay the processing fee?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pay via M-Pesa Paybill 4167853, using your Application ID as the account number. Fees range from KES 1,300 for a personal grant to KES 6,500 for a business loan."
          }
        },
        {
          "@type": "Question",
          "name": "What is the 65% pre-approval for loans?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For all loan products, our automated system issues an instant pre-qualification equal to 65% of your requested amount upon application submission. For example, if you apply for $20,000, you immediately receive a $13,000 pre-approval."
          }
        },
        {
          "@type": "Question",
          "name": "Is Cardone Loans & Grants a direct lender?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Cardone Loans & Grants acts as an intermediary, connecting Kenyan applicants with reputable U.S.-based funding companies and grant foundations. We facilitate the application, underwriting, and disbursement process."
          }
        },
        {
          "@type": "Question",
          "name": "Can I apply from anywhere in Kenya?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The entire process — application, document submission, fee payment, and communication — is handled digitally. You never need to visit a physical office. We serve all 47 Kenyan counties."
          }
        }
      ]
    }
    </script>
